# vcluster.yaml with ArgoCD v2 integration enabled
# This shows how to configure ArgoCD on a tenant cluster via Helm values
# (alternative to UI toggle).
#
# Note: integrations.argoCD and deploy.argoCD sections are STRIPPED from
# the vcluster.yaml before Helm deploy - the tenant cluster never sees
# the ArgoCD config. The Platform reconciler handles it separately.

# Standard vCluster config
controlPlane:
  statefulSet:
    highAvailability:
      replicas: 1

# ArgoCD v2 integration (processed by Platform, stripped before deploy)
integrations:
  argoCD:
    enabled: true
    connector: local-argocd

# Deploy ArgoCD applications with the tenant cluster
deploy:
  argoCD:
    applications:
      - name: my-nginx
        templateRef:
          name: nginx-from-git
        parameters:
          - name: targetNamespace
            value: "nginx-app"
          - name: repoURL
            value: "https://github.com/adriankabala/argocd-v2-demo.git"
      - name: my-guestbook-inline
        inline:
          spec:
            source:
              repoURL: "https://github.com/adriankabala/argocd-v2-demo.git"
              targetRevision: main
              path: manifests/guestbook
            destination:
              namespace: guestbook-app
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
