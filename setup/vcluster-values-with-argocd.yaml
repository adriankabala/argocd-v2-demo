# vcluster.yaml with ArgoCD v2 integration enabled
# This shows how to configure ArgoCD on a tenant cluster via Helm values
# (alternative to UI toggle).
#
# Note: integrations.argoCD is STRIPPED from the vcluster.yaml before
# Helm deploy - the tenant cluster never sees the ArgoCD config.
# The Platform reconciler handles it separately.
#
# Apps are created separately via ArgoApplication CRDs (just deploy_apps).

# Standard vCluster config
sync:
  toHost:
    ingresses:
      enabled: true
controlPlane:
  coredns:
    enabled: true
    embedded: true
  backingStore:
    etcd:
      embedded:
        enabled: true

# ArgoCD v2 integration (processed by Platform, stripped before deploy)
integrations:
  argoCD:
    enabled: true
    connector: local-argocd
